<div class="sidebar" [class.open]="isOpen">
    <button class="hamburger-btn" (click)="toggleMenu()">
        <img src="assets/icons/menu.png" alt="Menú" class="menu-icon">
    </button>

    <!-- 👇 Solo aparece si el sidebar está abierto -->
    <div class="name__page" *ngIf="isOpen">
        <h4>Casita Bakery</h4>
    </div>

    <div class="options__menu">
        <a *ngFor="let item of menu" [routerLink]="item.route" routerLinkActive="active">
            <img [src]="item.icon" [alt]="item.label" class="menu-icon">
            <span *ngIf="isOpen">{{ item.label }}</span>
        </a>
    </div>

    <!-- 👤 Usuario logueado -->
    <div class="user-info">
        <img [src]="user.avatar" alt="Usuario" class="user-avatar">
        <span *ngIf="isOpen">{{ user.name }}</span>
    </div>
</div>
